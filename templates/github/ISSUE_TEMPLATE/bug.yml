name: Bug Report
description: Report a bug with reproduction and impact
labels: ["type: bug", "status: todo"]
body:
  - type: textarea
    id: reproduce
    attributes:
      label: 重现步骤
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 影响范围

  - type: input
    id: severity
    attributes:
      label: 严重程度
      placeholder: Critical / Major / Minor / Cosmetic

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
